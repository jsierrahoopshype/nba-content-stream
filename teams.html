<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teams — NBA Content Stream · HoopsMatic</title>
<meta name="description" content="Browse every NBA team with recent content in the HoopsMatic stream. News, podcasts, reporter posts.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" type="image/x-icon" href="favicon.ico">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="container">
  <div class="tabs">
    <a href="index.html">Feed</a>
    <a href="players.html">Players</a>
    <a href="teams.html" class="active">Teams</a>
  </div>
  <div class="hdr">
    <h1>Teams</h1>
    <span class="brand">HoopsMatic · NBA Content Stream</span>
  </div>
  <p class="subtitle">Ranked by mention volume in the rolling window. Click any row for the team's full stream.</p>

  <div class="controls">
    <div class="search-row">
      <div class="search-group">
        <label>Filter by name</label>
        <input type="text" id="q" placeholder="e.g. Lakers, Spurs…" autocomplete="off">
        <div class="suggest" id="suggest"></div>
      </div>
    </div>
  </div>

  <div class="summary" id="summary">loading…</div>
  <div class="leaderboard leaderboard--teams" id="leaderboard"></div>
  <div class="empty" id="empty" style="display:none">No teams match that filter.</div>
</div>

<script src="assets/config.js"></script>
<script src="assets/common.js"></script>
<script>
(async function () {
  const ncs = window.NCS;
  const manifest = await fetch(window.NCS_dataUrl("data/index/manifest.json")).then((r) => r.json());
  const cap = manifest.max_items_per_entity || null;

  const inputEl = document.getElementById("q");
  const suggestEl = document.getElementById("suggest");
  ncs.attachSearch(inputEl, suggestEl, manifest, "");

  const grid = document.getElementById("leaderboard");
  const summary = document.getElementById("summary");
  const emptyEl = document.getElementById("empty");

  function initials(name) {
    const parts = String(name || "").split(/\s+/).filter(Boolean);
    if (!parts.length) return "?";
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function rowHtml(rank, t) {
    const logo = ncs.teamLogoUrl(t.slug);
    const portraitHtml = logo
      ? `<img class="lb-portrait lb-portrait--team" src="${ncs.escapeHtml(logo)}"
           alt="" loading="lazy" decoding="async"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <span class="lb-portrait-fallback" aria-hidden="true">${ncs.escapeHtml(initials(t.name))}</span>`
      : `<span class="lb-portrait-fallback" style="display:flex" aria-hidden="true">${ncs.escapeHtml(initials(t.name))}</span>`;
    const conf = ncs.teamConference(t.slug);
    const confHtml = conf
      ? `<span class="lb-conf lb-conf--${conf.toLowerCase()}">${ncs.escapeHtml(conf)}</span>`
      : '<span class="lb-team-empty">—</span>';
    return `
      <a class="lb-row" href="teams/${ncs.escapeHtml(t.slug)}.html" data-rank="${rank}">
        <span class="lb-rank">${rank}</span>
        <span class="lb-portrait-wrap">${portraitHtml}</span>
        <span class="lb-name">${ncs.escapeHtml(t.name)}</span>
        <span class="lb-secondary">${confHtml}</span>
        <span class="lb-count">${ncs.escapeHtml(ncs.formatCappedCount(t.count, cap))}</span>
      </a>
    `;
  }

  function render(filter) {
    const f = (filter || "").trim().toLowerCase();
    const all = manifest.teams;
    let html = "";
    let shown = 0;
    for (let i = 0; i < all.length; i++) {
      const t = all[i];
      if (f && t.name.toLowerCase().indexOf(f) === -1) continue;
      html += rowHtml(i + 1, t);
      shown++;
    }
    grid.innerHTML = html;
    emptyEl.style.display = shown ? "none" : "block";
    summary.innerHTML = f
      ? `<strong>${shown}</strong> of <strong>${all.length}</strong> teams match "${ncs.escapeHtml(f)}"`
      : `<strong>${all.length}</strong> teams with content`;
  }

  render("");
  inputEl.addEventListener("input", (e) => render(e.target.value));
})();
</script>
</body>
</html>
