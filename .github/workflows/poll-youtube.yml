name: Poll YouTube

# YouTube runs hourly at 10 past, offset from poll-sources (:00/:15/:30/:45)
# and poll-reddit (:05) to avoid commit collisions on the data/ branch.
# All three workflows share the `shard-commit` concurrency group, so if a
# collision still happens the later workflow queues.
#
# Episodes-only: we hit playlistItems.list per channel via the YouTube
# Data API v3 with the YOUTUBE_API_KEY secret. No transcripts, no AI.
# Per-cycle quota is ~57 units (1 per channel); 24h is ~1,370 units,
# well under the 10,000 default quota.

on:
  schedule:
    - cron: "10 * * * *"
  workflow_dispatch:

concurrency:
  group: shard-commit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Poll YouTube
        continue-on-error: true
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python -m scripts.poll_youtube --since-hours 24

      - name: Commit and push new shards
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes this cycle."
            exit 0
          fi
          git commit -m "data: youtube poll $(date -u +%Y-%m-%dT%H:%MZ)"
          for attempt in 1 2 3; do
            if git pull --rebase origin "$BRANCH" && git push; then
              exit 0
            fi
            echo "push attempt $attempt failed; retrying"
            sleep $((attempt * 5))
          done
          echo "push failed after 3 attempts"
          exit 1
