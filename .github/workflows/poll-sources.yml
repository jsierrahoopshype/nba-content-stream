name: Poll sources

# Bluesky + Google News on a 15-minute cron. Reddit runs on its own
# slower schedule from poll-reddit.yml (DC IPs get 429'd by Reddit if
# we hammer top/day every 15 min, and the top/day feed doesn't change
# that fast anyway).
#
# Both workflows share the `shard-commit` concurrency group so they
# never push to data/ simultaneously and force a git race. Inside this
# workflow `cancel-in-progress: false` queues overlapping cycles
# rather than dropping them.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Source to poll (all, bluesky, google-news)"
        required: false
        type: choice
        options:
          - all
          - bluesky
          - google-news
        default: all

concurrency:
  group: shard-commit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Each poller runs with continue-on-error so one source failing
      # (e.g. Bluesky AppView blip) doesn't suppress the commit of
      # whatever the other source did manage to fetch.
      - name: Poll Bluesky
        if: ${{ github.event_name == 'schedule' || github.event.inputs.source == 'all' || github.event.inputs.source == 'bluesky' }}
        continue-on-error: true
        run: python -m scripts.poll_bluesky --since-hours 24

      - name: Poll Google News
        if: ${{ github.event_name == 'schedule' || github.event.inputs.source == 'all' || github.event.inputs.source == 'google-news' }}
        continue-on-error: true
        run: python -m scripts.poll_google_news --since-hours 24

      - name: Commit and push new shards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes this cycle."
            exit 0
          fi
          git commit -m "data: poll cycle $(date -u +%Y-%m-%dT%H:%MZ)"
          # The `shard-commit` concurrency group prevents the two
          # workflows from pushing concurrently, but the remote may
          # still have moved between checkout and push (e.g. someone
          # merged to main). Rebase onto remote before pushing.
          for attempt in 1 2 3; do
            if git pull --rebase origin "$GITHUB_REF_NAME" && git push; then
              exit 0
            fi
            echo "push attempt $attempt failed; retrying"
            sleep $((attempt * 5))
          done
          echo "push failed after 3 attempts"
          exit 1
