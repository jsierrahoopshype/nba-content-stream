name: Poll sources

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Specific source to poll (leave blank for all)"
        required: false
        type: choice
        options:
          - all
          - youtube
          - substack
          - bluesky
          - reddit
          - google-news
        default: all

# Prevent overlapping runs
concurrency:
  group: poll-sources
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          # Phase 2 will populate requirements.txt
          if [ -f scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          else
            echo "No requirements.txt yet (Phase 1 stub)"
          fi

      # ----- Phase 2 will add steps here, one per source -----
